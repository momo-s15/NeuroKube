# Optional: provoke OOMKilled on the stress sidecar (stress as PID 1, allocation over limit).
# kubectl apply -f victim/deployment-oom.yaml
# Watch: kubectl get pods -n default -l app=nginx-victim -w
# Revert stable demo: kubectl apply -f victim/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-victim
  namespace: default
  labels:
    app: nginx-victim
    neurokube.io/monitored: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-victim
  template:
    metadata:
      labels:
        app: nginx-victim
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: stress
          image: polinux/stress
          command: ["stress", "--vm", "1", "--vm-bytes", "320M", "--verbose"]
          resources:
            limits:
              memory: "256Mi"
