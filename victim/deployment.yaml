apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-victim
  namespace: default
  labels:
    app: nginx-victim
    neurokube.io/monitored: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-victim
  template:
    metadata:
      labels:
        app: nginx-victim
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
        - name: stress
          image: polinux/stress
          command: ["sleep", "infinity"]
          resources:
            limits:
              memory: "256Mi"
