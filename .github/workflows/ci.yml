name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: go mod download
      - run: go vet ./...
      - run: go build -o /tmp/neurokube-brain .

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./brain
          push: false
          tags: neurokube-brain:ci
